<div class="kanban-container">
  <h1>Mi Tablero Kanban - Firebase</h1>
  <!-- Formulario para agregar tareas -->

  <div class="add-task-form">
    <input type="text" [(ngModel)]="newTaskTitle" placeholder="Escribe una nueva tarea..."
      (keyup.enter)="createTask()" />
    <button (click)="createTask()">Agregar</button>
  </div>
  <!-- Estado de carga -->
  <div *ngIf="loading" class="loading">
    Conectando con Firestore y cargando tareas...
  </div>

  <!-- Mensaje de error de Firestore -->
  <div *ngIf="errorMessage" class="error-message"
    style="color: #721c24; margin: 15px 0; font-weight: bold; background-color: #f8d7da; border: 1px solid #f5c6cb; padding: 12px; border-radius: 6px;">
    ⚠️ {{ errorMessage }}
  </div>


  <!-- Contenedor del Tablero -->
  <div *ngIf="!loading" class="board" cdkDropListGroup>
    <!-- Columna: Por Hacer -->
    <div class="column">
      <h2>Por hacer 📌</h2>
      <div cdkDropList [cdkDropListData]="todo" class="task-list" (cdkDropListDropped)="drop($event, 'todo')">
        <div class="task-card" *ngFor="let task of todo" cdkDrag [cdkDragDisabled]="editingTaskId === task.id">
          <!-- MODO EDICIÓN -->
          <div *ngIf="editingTaskId === task.id" class="edit-mode">
            <input type="text" [(ngModel)]="editingTitle" (keyup.enter)="saveEdit(task)" (blur)="saveEdit(task)" />
          </div>
          <!-- MODO VISTA NORMAL -->
          <div *ngIf="editingTaskId !== task.id" class="view-mode" (dblclick)="startEdit(task)">
            <span class="task-text"> {{ task.title }} </span>
            <button class="delete-btn" (click)="removeTask(task.id); $event.stopPropagation()">x</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Columna: En Progreso -->
    <div class="column">
      <h2>En progreso ⏳</h2>
      <div cdkDropList [cdkDropListData]="doing" class="task-list" (cdkDropListDropped)="drop($event, 'doing')">
        <div class="task-card" *ngFor="let task of doing" cdkDrag [cdkDragDisabled]="editingTaskId === task.id">
          <!-- MODO EDICIÓN -->
          <div *ngIf="editingTaskId === task.id" class="edit-mode">
            <input type="text" [(ngModel)]="editingTitle" (keyup.enter)="saveEdit(task)" (blur)="saveEdit(task)" />
          </div>
          <!-- MODO VISTA NORMAL -->
          <div *ngIf="editingTaskId !== task.id" class="view-mode" (dblclick)="startEdit(task)">
            <span class="task-text"> {{ task.title }} </span>
            <button class="delete-btn" (click)="removeTask(task.id); $event.stopPropagation()">x</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Columna: Terminado -->
    <div class="column">
      <h2>Terminado ✅</h2>
      <div cdkDropList [cdkDropListData]="done" class="task-list" (cdkDropListDropped)="drop($event, 'done')">
        <div class="task-card" *ngFor="let task of done" cdkDrag [cdkDragDisabled]="editingTaskId === task.id">
          <!-- MODO EDICIÓN -->
          <div *ngIf="editingTaskId === task.id" class="edit-mode">
            <input type="text" [(ngModel)]="editingTitle" (keyup.enter)="saveEdit(task)" (blur)="saveEdit(task)" />
          </div>
          <!-- MODO VISTA NORMAL -->
          <div *ngIf="editingTaskId !== task.id" class="view-mode" (dblclick)="startEdit(task)">
            <span class="task-text"> {{ task.title }} </span>
            <button class="delete-btn" (click)="removeTask(task.id); $event.stopPropagation()">x</button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
