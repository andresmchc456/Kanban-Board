<div style="padding: 20px; font-family: sans-serif;">
  <h1>Mi Tablero Kanban - Firebase 🚀</h1>

  <h3>Tareas en tiempo real:</h3>

  <!-- El pipe async se encarga de suscribirse automáticamente -->
  <ul *ngIf="tasks$ | async as tasks; else loading">
    <li *ngFor="let task of tasks"
      style="margin-bottom: 10px; padding: 8px; border: 1px solid #ccc; list-style: none; border-radius: 4px;">
      <strong>{{ task.title }}</strong> - <span style="color: gray;">Status: {{ task.status }}</span>
    </li>
    <p *ngIf="tasks.length === 0">No hay tareas en Firestore todavía. ¡Agrega una desde la consola!</p>
  </ul>

  <ng-template #loading>
    <p>Conectando con Firestore y cargando tareas...</p>
  </ng-template>
</div>
